<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:#0a0e27;color:#e0e6ed;display:flex;min-height:100vh}
.sidebar{width:220px;background:linear-gradient(180deg,#0d1335 0%,#0a0e27 100%);border-right:1px solid rgba(255,255,255,0.06);padding:20px 0;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100}
.sidebar-logo{padding:0 16px 16px;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:12px}
.sidebar-logo h2{font-size:15px;font-weight:700;color:#fff;letter-spacing:1px}
.sidebar-logo .sub{font-size:10px;color:#4a5568;margin-top:2px}
.sidebar-nav{list-style:none}
.sidebar-nav li{margin:1px 0}
.sidebar-nav li a{display:flex;align-items:center;gap:8px;padding:9px 16px;color:#6b7c93;text-decoration:none;font-size:12px;transition:all 0.2s;border-left:3px solid transparent;cursor:pointer}
.sidebar-nav li a:hover{color:#c8d2e0;background:rgba(255,255,255,0.03)}
.sidebar-nav li a.active{color:#60a5fa;background:rgba(96,165,250,0.08);border-left-color:#60a5fa;font-weight:600}
.main{margin-left:220px;flex:1;padding:20px;min-width:0}
.panel{display:none}
.panel.active{display:block}
.panel-header{margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.06)}
.panel-header h2{font-size:20px;font-weight:700;color:#fff;letter-spacing:.5px}
.panel-header .desc{font-size:11px;color:#4a5568;margin-top:4px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:linear-gradient(135deg,#131a3a 0%,#0f1535 100%);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:18px 20px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:2px}
.kpi-card.c-green::before{background:#00d4aa}
.kpi-card.c-blue::before{background:#60a5fa}
.kpi-card.c-amber::before{background:#f59e0b}
.kpi-card.c-purple::before{background:#a78bfa}
.kpi-card.c-red::before{background:#ef4444}
.kpi-label{font-size:11px;color:#6b7c93;margin-bottom:4px;letter-spacing:.5px}
.kpi-value{font-size:28px;font-weight:700;color:#fff;line-height:1.2}
.kpi-value .unit{font-size:14px;font-weight:400;color:#6b7c93}
.kpi-sub{font-size:10px;color:#4a5568;margin-top:4px}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(420px,1fr));gap:12px;margin-bottom:20px}
.chart-grid.cols-3{grid-template-columns:repeat(3,1fr)}
.chart-grid.cols-1{grid-template-columns:1fr}
.chart-box{background:linear-gradient(135deg,#131a3a 0%,#0f1535 100%);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:18px 22px}
.chart-box.full{grid-column:1/-1}
.chart-box h3{font-size:13px;font-weight:600;color:#c8d2e0;margin-bottom:10px;letter-spacing:.5px}
.chart-wrap{position:relative;width:100%;height:280px}
.chart-wrap canvas{width:100%!important}
.data-table{width:100%;border-collapse:collapse;font-size:11px}
.data-table th{background:rgba(96,165,250,0.12);color:#60a5fa;font-weight:600;text-align:left;padding:8px 12px;font-size:10px;letter-spacing:.5px}
.data-table td{padding:7px 12px;border-bottom:1px solid rgba(255,255,255,0.04);color:#c8d2e0}
.data-table tr:hover td{background:rgba(255,255,255,0.02)}
.hl{color:#00d4aa;font-weight:600}
.wn{color:#f59e0b;font-weight:600}
.dn{color:#ef4444;font-weight:600}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:600;letter-spacing:.5px}
.tag-done{background:rgba(0,212,170,0.15);color:#00d4aa}
.tag-prog{background:rgba(245,158,11,0.15);color:#f59e0b}
.tag-plan{background:rgba(96,165,250,0.15);color:#60a5fa}
.insight-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:20px}
.insight-card{border-radius:10px;padding:18px 20px;border:1px solid rgba(255,255,255,0.06)}
.insight-card.growth{background:linear-gradient(135deg,rgba(0,212,170,0.06) 0%,rgba(0,212,170,0.02) 100%);border-color:rgba(0,212,170,0.12)}
.insight-card.opportunity{background:linear-gradient(135deg,rgba(245,158,11,0.06) 0%,rgba(245,158,11,0.02) 100%);border-color:rgba(245,158,11,0.12)}
.insight-card.action{background:linear-gradient(135deg,rgba(96,165,250,0.06) 0%,rgba(96,165,250,0.02) 100%);border-color:rgba(96,165,250,0.12)}
.insight-card .icon{font-size:18px;margin-bottom:6px}
.insight-card h4{font-size:13px;color:#fff;margin-bottom:6px}
.insight-card p{font-size:11px;color:#94a3b8;line-height:1.6}
.contradiction-row{display:flex;gap:12px;margin-top:8px}
.contradiction-row>div{flex:1;border-radius:8px;padding:12px;font-size:11px}
.contradiction-row h4{font-size:12px;margin-bottom:6px}
.contradiction-row p{color:#94a3b8;line-height:1.5}
.price-viz{display:flex;align-items:center;gap:16px;padding:16px 0}
.price-viz .pv-box{text-align:center;flex:1}
.price-viz .pv-box .pv-num{font-size:24px;font-weight:700}
.price-viz .pv-arrow{font-size:20px;color:#4a5568}
.exp-flow{display:flex;align-items:center;gap:12px;padding:16px;background:rgba(255,255,255,0.02);border-radius:8px;font-size:11px;margin:10px 0}
.exp-box{background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.2);border-radius:8px;padding:12px 14px;text-align:center;min-width:90px}
.exp-box h5{color:#fff;font-size:11px;margin-bottom:4px}
.exp-box p{color:#6b7c93;font-size:10px;line-height:1.5}
.exp-arrow{color:#4a5568;font-size:16px}
ul.info-list{font-size:11px;color:#94a3b8;line-height:2;list-style:disc;padding-left:18px}
ul.info-list li b.c1{color:#60a5fa}
ul.info-list li b.c2{color:#00d4aa}
ul.info-list li b.c3{color:#f59e0b}
ul.info-list li b.c4{color:#a78bfa}
.strategy-table{width:100%;border-collapse:collapse;font-size:10px;margin-top:8px}
.strategy-table th{background:rgba(96,165,250,0.12);color:#60a5fa;font-weight:600;padding:8px 6px;text-align:center;font-size:10px}
.strategy-table td{padding:6px;border-bottom:1px solid rgba(255,255,255,0.04);color:#c8d2e0;text-align:center}
.strategy-table tr:hover td{background:rgba(255,255,255,0.02)}
pre.code{font-size:10px;color:#94a3b8;line-height:1.8;margin:0}
@media(max-width:1200px){.chart-grid{grid-template-columns:1fr}.chart-grid.cols-3{grid-template-columns:1fr}}
@media(max-width:900px){.sidebar{width:160px}.main{margin-left:160px}.kpi-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){.sidebar{display:none}.main{margin-left:0}.kpi-grid{grid-template-columns:1fr}}
</style>
</head>

// ============= 工具函数 =============
function T(tag,cls='',html=''){return `<${tag} class="${cls}">${html}</${tag}>`}
function KPI(items){return `<div class="kpi-grid">${items.join('')}</div>`}
function KC(color,label,value,sub=''){return `<div class="kpi-card c-${color}"><div class="kpi-label">${label}</div><div class="kpi-value">${value}</div>${sub?`<div class="kpi-sub">${sub}</div>`:''}</div>`}
function CHART(id,h=280){return `<div class="chart-box"><h3 id="${id}_title"></h3><div class="chart-wrap" style="height:${h}px"><canvas id="${id}"></canvas></div></div>`}
function GRID(items,cls=''){return `<div class="chart-grid ${cls}">${items.join('')}</div>`}
function BOX(h3,body,h){return `<div class="chart-box${h?' full':''}"><h3>${h3}</h3>${body}</div>`}
function TBL(headers,rows){let h='<tr>'+headers.map(c=>`<th>${c}</th>`).join('')+'</tr>';let b=rows.map(r=>'<tr>'+r.map(c=>`<td>${c}</td>`).join('')+'</tr>').join('');return `<table class="data-table">${h}${b}</table>`}
function INS(type,icon,title,body){return `<div class="insight-card ${type}"><div class="icon">${icon}</div><h4>${title}</h4><p>${body}</p></div>`}

// ============= Dark chart defaults =============
function mkOpts(extra={}){

    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#6b7c93',font:{size:11},padding:14}},
      tooltip:{backgroundColor:'rgba(15,21,53,0.95)',titleColor:'#fff',bodyColor:'#c8d2e0',borderColor:'rgba(96,165,250,0.2)',borderWidth:1,padding:12}},
    scales:{x:{ticks:{color:'#4a5568',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}},

  },extra);
}

// ============= Panel switching =============
function switchPanel(pid){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const el=document.getElementById(pid);
  if(el)el.classList.add('active');
  document.querySelectorAll('.sidebar-nav a').forEach(a=>a.classList.remove('active'));
  const link=document.querySelector(`.sidebar-nav a[href="#${pid}"]`);
  if(link)link.classList.add('active');
  setTimeout(()=>{Object.values(Chart.instances).forEach(c=>c.resize())},150);
}
</script>
